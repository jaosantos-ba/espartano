<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Financeiro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS EXTERNO -->
  <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card card-login shadow">

        <!--<div class="logo-login">
          <img src="logo.png" alt="Logo da Empresa">
        </div> -->

        <div id="errorMsg" class="text-error">Login inválido</div>

        <form id="loginForm">
          <div class="mb-3 position-relative">
            <label>Email</label>
            <input type="email" id="email" class="form-control" placeholder="exemplo@email.com" required>
            <i class="bi bi-envelope position-absolute icon-input"></i>
          </div>

          <div class="mb-3 position-relative">
            <label>Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="********" required>
            <i class="bi bi-lock position-absolute icon-input"></i>
          </div>

          <div class="d-flex justify-content-end mb-3">
            <a href="#" id="recuperarSenha">Recuperar Senha</a>
          </div>

          <button type="submit" class="btn btn-login w-100 mb-2">Entrar</button>

          <div class="social-btn">
            <button type="button" class="btn google-btn w-100" id="googleLogin">
              <i class="bi bi-google"></i> Entrar com Google
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>

<!-- JS EXTERNO -->
<script src="assets/js/login.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
