<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Inicial de Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6f9;
    }
    .card-form {
      max-width: 1100px;
      margin: 30px auto;
      border: none;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 25px 0 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid #dee2e6;
    }
    .required::after {
      content: " *";
      color: #dc3545;
    }
    .btn-loading {
      pointer-events: none;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card card-form p-4">
    <h3 class="mb-4">Formulário Novo Cliente</h3>

    <div id="mensagem" class="alert d-none" role="alert"></div>

    <form id="formCliente" novalidate>

      <div class="section-title">Dados iniciais</div>
      <div class="row">
        <div class="col-md-3 mb-3">
          <label class="form-label required">CPF</label>
          <input type="text" id="clienteCPF" class="form-control" maxlength="14" required>
        </div>
        <div class="col-md-9 mb-3">
          <label class="form-label required">Nome completo</label>
          <input type="text" id="clienteNome" class="form-control" required>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3 mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" id="clienteTelefone" class="form-control" maxlength="15">
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">UF</label>
          <select id="clienteUF" class="form-select">
            <option value="">Selecione</option>
            <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
            <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
            <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
            <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
            <option>SP</option><option>SE</option><option>TO</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Cidade</label>
          <input type="text" id="clienteCidade" class="form-control">
        </div>
      </div>

      <div class="section-title">Documentos</div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">CNH</label>
          <input type="text" id="clienteCNH" class="form-control">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Categoria</label>
          <select id="clienteCatCNH" class="form-select">
            <option value="">Selecione</option>
            <option>A</option>
            <option>B</option>
            <option>AB</option>
            <option>C</option>
            <option>D</option>
            <option>E</option>
            <option>AE</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Vencimento CNH</label>
          <input type="date" id="clienteVctoCNH" class="form-control">
        </div>
      </div>

      <div class="section-title">Referência 01</div>
      <div class="row">
        <div class="col-md-5 mb-3">
          <label class="form-label">Nome</label>
          <input type="text" id="ref1Nome" class="form-control">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Grau de parentesco</label>
          <input type="text" id="ref1Par" class="form-control">
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" id="ref1Tel" class="form-control" maxlength="15">
        </div>
      </div>

      <div class="section-title">Referência 02</div>
      <div class="row">
        <div class="col-md-5 mb-3">
          <label class="form-label">Nome</label>
          <input type="text" id="ref2Nome" class="form-control">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Grau de parentesco</label>
          <input type="text" id="ref2Par" class="form-control">
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" id="ref2Tel" class="form-control" maxlength="15">
        </div>
      </div>

      <div class="section-title">Endereço</div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Logradouro</label>
          <input type="text" id="endLog" class="form-control">
        </div>
        <div class="col-md-2 mb-3">
          <label class="form-label">Número</label>
          <input type="text" id="endNum" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Complemento</label>
          <input type="text" id="endComp" class="form-control">
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">Bairro</label>
          <input type="text" id="endBairro" class="form-control">
        </div>
        <div class="col-md-2 mb-3">
          <label class="form-label">UF</label>
          <select id="endUF" class="form-select">
            <option value="">Selecione</option>
            <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
            <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
            <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
            <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
            <option>SP</option><option>SE</option><option>TO</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Cidade</label>
          <input type="text" id="endCidade" class="form-control">
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">CEP</label>
          <input type="text" id="endCEP" class="form-control" maxlength="9">
        </div>
      </div>

      <div class="section-title">Veículo</div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Renavam</label>
          <input type="text" id="VeicRenavam" class="form-control">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Placa</label>
          <input type="text" id="VeicPlaca" class="form-control" maxlength="8">
        </div>
        <div class="col-md-2 mb-3">
          <label class="form-label">Ano</label>
          <input type="text" id="VeicAno" class="form-control" maxlength="4">
        </div>
        <div class="col-md-2 mb-3">
          <label class="form-label">Modelo</label>
          <input type="text" id="VeicModelo" class="form-control">
        </div>
      </div>

      <div class="section-title">Profissional</div>
      <div class="row">
        <div class="col-md-5 mb-3">
          <label class="form-label">Empresa</label>
          <input type="text" id="ProfEmp" class="form-control">
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">Mês/Ano</label>
          <input type="text" id="ProfMesAno" class="form-control" placeholder="MM/AAAA" maxlength="7">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Faturamento</label>
          <input type="text" id="ProfFat" class="form-control">
        </div>
      </div>

      <button type="submit" id="btnEnviar" class="btn btn-primary">Enviar cadastro</button>
    </form>
  </div>
</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzvYrpibL7-Cwej_Y-t0ZytgmVTpLDtDY1IdNt--UUleilOTuHhFiaxzOwP0-ks-qoB8A/exec";

const form = document.getElementById("formCliente");
const mensagem = document.getElementById("mensagem");
const btnEnviar = document.getElementById("btnEnviar");

function mostrarMensagem(tipo, texto) {
  mensagem.className = `alert alert-${tipo}`;
  mensagem.textContent = texto;
  mensagem.classList.remove("d-none");
}

function limparMensagem() {
  mensagem.className = "alert d-none";
  mensagem.textContent = "";
}

function aplicarMascaraCPF(valor) {
  valor = valor.replace(/\D/g, "").slice(0, 11);
  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
  return valor;
}

function aplicarMascaraTelefone(valor) {
  valor = valor.replace(/\D/g, "").slice(0, 11);
  if (valor.length <= 10) {
    valor = valor.replace(/(\d{2})(\d)/, "($1) $2");
    valor = valor.replace(/(\d{4})(\d)/, "$1-$2");
  } else {
    valor = valor.replace(/(\d{2})(\d)/, "($1) $2");
    valor = valor.replace(/(\d{5})(\d)/, "$1-$2");
  }
  return valor;
}

function aplicarMascaraCEP(valor) {
  valor = valor.replace(/\D/g, "").slice(0, 8);
  valor = valor.replace(/(\d{5})(\d)/, "$1-$2");
  return valor;
}

function aplicarMascaraPlaca(valor) {
  valor = valor.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 7);
  if (valor.length > 3) {
    valor = valor.slice(0, 3) + "-" + valor.slice(3);
  }
  return valor;
}

function aplicarMascaraMesAno(valor) {
  valor = valor.replace(/\D/g, "").slice(0, 6);
  if (valor.length > 2) {
    valor = valor.slice(0, 2) + "/" + valor.slice(2);
  }
  return valor;
}

function formatarMoeda(valor) {
  valor = valor.replace(/\D/g, "");
  if (!valor) return "";
  valor = (parseInt(valor, 10) / 100).toFixed(2) + "";
  valor = valor.replace(".", ",");
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return "R$ " + valor;
}

function validarCPF(cpf) {
  let strCPF = cpf.replace(/\D/g, "");

  if (strCPF.length !== 11 || /^(\d)\1+$/.test(strCPF)) return false;

  let soma = 0;
  for (let i = 0; i < 9; i++) {
    soma += parseInt(strCPF.charAt(i), 10) * (10 - i);
  }

  let resto = (soma * 10) % 11;
  if (resto === 10 || resto === 11) resto = 0;
  if (resto !== parseInt(strCPF.charAt(9), 10)) return false;

  soma = 0;
  for (let i = 0; i < 10; i++) {
    soma += parseInt(strCPF.charAt(i), 10) * (11 - i);
  }

  resto = (soma * 10) % 11;
  if (resto === 10 || resto === 11) resto = 0;

  return resto === parseInt(strCPF.charAt(10), 10);
}

document.getElementById("clienteCPF").addEventListener("input", e => {
  e.target.value = aplicarMascaraCPF(e.target.value);
});

document.getElementById("clienteTelefone").addEventListener("input", e => {
  e.target.value = aplicarMascaraTelefone(e.target.value);
});

document.getElementById("ref1Tel").addEventListener("input", e => {
  e.target.value = aplicarMascaraTelefone(e.target.value);
});

document.getElementById("ref2Tel").addEventListener("input", e => {
  e.target.value = aplicarMascaraTelefone(e.target.value);
});

document.getElementById("endCEP").addEventListener("input", e => {
  e.target.value = aplicarMascaraCEP(e.target.value);
});

document.getElementById("VeicPlaca").addEventListener("input", e => {
  e.target.value = aplicarMascaraPlaca(e.target.value);
});

document.getElementById("ProfMesAno").addEventListener("input", e => {
  e.target.value = aplicarMascaraMesAno(e.target.value);
});

document.getElementById("ProfFat").addEventListener("input", e => {
  e.target.value = formatarMoeda(e.target.value);
});

async function buscarCEP(cep) {
  const cepLimpo = cep.replace(/\D/g, "");

  if (cepLimpo.length !== 8) return;

  try {
    const resposta = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
    const dados = await resposta.json();

    if (dados.erro) {
      mostrarMensagem("danger", "CEP não encontrado.");
      return;
    }

    document.getElementById("endLog").value = dados.logradouro || "";
    document.getElementById("endBairro").value = dados.bairro || "";
    document.getElementById("endUF").value = dados.uf || "";
    document.getElementById("endCidade").value = dados.localidade || "";
  } catch (erro) {
    mostrarMensagem("danger", "Não foi possível consultar o CEP.");
  }
}

document.getElementById("endCEP").addEventListener("blur", function () {
  buscarCEP(this.value);
});

form.addEventListener("submit", async function (e) {
  e.preventDefault();
  limparMensagem();

  const cpf = document.getElementById("clienteCPF").value.trim();
  const nome = document.getElementById("clienteNome").value.trim();

  if (!cpf || !nome) {
    mostrarMensagem("danger", "Preencha os campos obrigatórios: CPF e Nome completo.");
    return;
  }

  if (!validarCPF(cpf)) {
    mostrarMensagem("danger", "CPF inválido.");
    return;
  }

  const fat = document.getElementById("ProfFat").value
    .replace("R$", "")
    .replace(/\./g, "")
    .replace(",", ".")
    .trim();

  const formData = new FormData();
  formData.append("clienteCPF", cpf);
  formData.append("clienteNome", nome);
  formData.append("clienteTelefone", document.getElementById("clienteTelefone").value.trim());
  formData.append("clienteUF", document.getElementById("clienteUF").value.trim());
  formData.append("clienteCidade", document.getElementById("clienteCidade").value.trim());

  formData.append("clienteCNH", document.getElementById("clienteCNH").value.trim());
  formData.append("clienteCatCNH", document.getElementById("clienteCatCNH").value.trim());
  formData.append("clienteVctoCNH", document.getElementById("clienteVctoCNH").value.trim());

  formData.append("ref1Nome", document.getElementById("ref1Nome").value.trim());
  formData.append("ref1Par", document.getElementById("ref1Par").value.trim());
  formData.append("ref1Tel", document.getElementById("ref1Tel").value.trim());

  formData.append("ref2Nome", document.getElementById("ref2Nome").value.trim());
  formData.append("ref2Par", document.getElementById("ref2Par").value.trim());
  formData.append("ref2Tel", document.getElementById("ref2Tel").value.trim());

  formData.append("endLog", document.getElementById("endLog").value.trim());
  formData.append("endNum", document.getElementById("endNum").value.trim());
  formData.append("endComp", document.getElementById("endComp").value.trim());
  formData.append("endBairro", document.getElementById("endBairro").value.trim());
  formData.append("endCEP", document.getElementById("endCEP").value.trim());
  formData.append("endUF", document.getElementById("endUF").value.trim());
  formData.append("endCidade", document.getElementById("endCidade").value.trim());

  formData.append("VeicRenavam", document.getElementById("VeicRenavam").value.trim());
  formData.append("VeicPlaca", document.getElementById("VeicPlaca").value.trim());
  formData.append("VeicAno", document.getElementById("VeicAno").value.trim());
  formData.append("VeicModelo", document.getElementById("VeicModelo").value.trim());

  formData.append("ProfEmp", document.getElementById("ProfEmp").value.trim());
  formData.append("ProfMesAno", document.getElementById("ProfMesAno").value.trim());
  formData.append("ProfFat", fat);

  try {
    btnEnviar.classList.add("btn-loading");
    btnEnviar.disabled = true;
    btnEnviar.textContent = "Enviando...";

    const resposta = await fetch(URL_SCRIPT, {
      method: "POST",
      body: formData
    });

    const texto = await resposta.text();

    if (texto.includes("OK")) {
      mostrarMensagem("success", "Cadastro enviado com sucesso.");
      form.reset();
    } else {
      mostrarMensagem("danger", "Erro ao enviar o cadastro.");
    }

  } catch (erro) {
    mostrarMensagem("danger", "Erro de conexão ao enviar o formulário.");
  } finally {
    btnEnviar.classList.remove("btn-loading");
    btnEnviar.disabled = false;
    btnEnviar.textContent = "Enviar cadastro";
  }
});
</script>

</body>
</html>
